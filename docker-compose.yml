services:
  muninn:
    image: muninn:latest
    container_name: muninn
    ports:
      - "4321:4321"
    environment:
      NODE_ENV: production
      VAULT_PATH: /vault
    volumes:
      - ${VAULT_HOST_PATH}:/vault:ro
      - ${STATE_HOST_PATH}:/state
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    restart: unless-stopped
